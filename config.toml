baseURL = "/"
languageCode = "en-es"
title = "BP"
theme = "ink"
paginate = 5

copyright = "© Copyright notice"
# Demo only
#ignoreErrors = ["error-missing-instagram-accesstoken"]

[permalinks]
  posts = "/:year/:month/:title"

[params]
	subtitle = "Blog creado para sentar las diferentes cosas que aprendo sobre programación."

	# Optional 64x64 avatar image.
	avatar = "http://www.avatarsinpixels..png"

	featherIconsCDN = false

	# Enable a table of contents
	toc = true

	# Max tags
  	maxTags = 7

  # Define words per minute to approximate reading time
  wpm = 250


# Nav.
[[menu.main]]
name = "Inicio"
url = "/"
weight = 1

[[menu.main]]
name = "Lista Posts"
url = "/posts"
weight = 2

[[menu.main]]
name = "Sobre mí"
url = "/about"
weight = 3

[[menu.main]]
name = "Tags"
url = "/tags"
weight = 4

[[params.social]]
name = "Github"
icon = "github"
url = "https://github.com/PereyraPaula"

[[params.social]]
name = "Linkedin"
icon = "linkedin"
url = "https:///linkedin.com/in/paula-pereyra-b1031622a"

#[[params.social]]
#name = "RSS"
#icon = "rss"
#url = "/index.xml"

[taxonomies]
   tag = "tags"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    noClasses = true
    style = "github"
    tabWidth = 4

  [markup.tableOfContents]
    endLevel = 3
    ordered = true
    startLevel = 2 
